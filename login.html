<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo - Welcome Back</title>
    <!-- Premium, modern tech typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-burgundy: #800020;
            --primary-gradient: linear-gradient(180deg, #8b0000 0%, #4a0000 100%);
            --text-dark: #111111;
            --text-muted: #666666;
            --input-bg: #eef2f5;
            --focus-shadow: 0 4px 12px rgba(128, 0, 32, 0.12);
            --error-red: #df2222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.2px;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            overflow: hidden; 
            background-color: #f1f5f9;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-view {
            width: 100%;
            height: 100dvh;
            max-width: 450px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: calc(35px + env(safe-area-inset-top)) 24px calc(25px + env(safe-area-inset-bottom)) 24px;
            background: #ffffff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .brand-section {
            width: 100%;
            text-align: center;
            margin-top: 10px;
        }

        .logo-image {
            width: 45%;
            max-width: 140px;
            height: auto;
            object-fit: contain;
        }

        .header-content {
            text-align: center;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        .header-content h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 6px;
            letter-spacing: -0.6px;
        }

        .header-content p {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: auto;
            padding-top: 10px;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .input-box {
            width: 100%;
            height: 54px;
            background-color: var(--input-bg);
            border: 1.5px solid transparent;
            border-radius: 14px;
            padding: 0 45px 0 16px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s ease;
        }

        .input-box:focus-within {
            border-color: var(--primary-burgundy);
            background-color: #ffffff;
            box-shadow: var(--focus-shadow);
        }

        .field-label {
            position: absolute;
            top: -9px;
            left: 14px;
            background-color: #ffffff;
            padding: 0 6px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dark);
            z-index: 2;
        }

        .label-highlight {
            color: var(--primary-burgundy);
            font-weight: 700;
        }

        .phone-input-wrapper {
            display: flex;
            align-items: center;
        }

        .phone-prefix-container {
            display: flex;
            align-items: center;
            gap: 6px;
            position: absolute;
            left: 16px;
            z-index: 3;
            pointer-events: none;
        }

        .ethiopia-flag {
            width: 22px;
            height: 14px;
            object-fit: cover;
            border-radius: 2px;
        }

        .country-code {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .input-box.phone-indent {
            padding-left: 82px;
        }

        .input-icon-right {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .form-action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-top: auto; 
        }

        .btn-submit {
            width: 100%;
            height: 54px;
            background: var(--primary-gradient);
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 27px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(128, 0, 32, 0.2);
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .reset-link {
            font-size: 14px;
            color: var(--text-dark);
            font-weight: 600;
            text-decoration: none;
        }

        .reset-link span {
            text-decoration: underline;
            color: var(--primary-burgundy);
            font-weight: 700;
        }

        .signup-redirect-footer {
            font-size: 14px;
            color: var(--text-dark);
            margin-top: 10px;
            text-align: center;
            font-weight: 600;
        }

        .signup-redirect-footer a {
            color: var(--primary-burgundy);
            font-weight: 800;
            text-decoration: none;
        }

        /* Micro Feedback Toast */
        .toast-container {
            position: absolute;
            top: calc(20px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            z-index: 999;
            display: none;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            width: 85%;
            max-width: 360px;
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toast-message">Error notification message</div>

    <div class="app-view">
        
        <div class="brand-section">
            <img class="logo-image" src="birrgo-logo.png" alt="BirrGo Logo">
        </div>

        <div class="header-content">
            <h1>Welcome Back!</h1>
            <p>Log in to your account</p>
        </div>

        <!-- System Authentication Form Wrapper -->
        <form class="login-form" id="loginForm">
            
            <!-- Phone Number Input Wrapper -->
            <div class="input-group phone-input-wrapper">
                <span class="field-label">Phone Number <span class="label-highlight">*</span></span>
                <div class="phone-prefix-container">
                    <svg class="ethiopia-flag" viewBox="0 0 60 30">
                        <rect width="60" height="10" fill="#008000"/>
                        <rect y="10" width="60" height="10" fill="#FFFF00"/>
                        <rect y="20" width="60" height="10" fill="#FF0000"/>
                        <circle cx="30" cy="15" r="7" fill="#0000FF"/>
                    </svg>
                    <span class="country-code">+251</span>
                </div>
                <input type="tel" id="loginPhone" class="input-box phone-indent" autofocus placeholder="9xxxxxxxx" required pattern="[79][0-9]{8}">
                <div class="input-icon-right">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                    </svg>
                </div>
            </div>

            <!-- Pin Authentication Entry Input -->
            <div class="input-group">
                <span class="field-label">PIN (4-digits) <span class="label-highlight">*</span></span>
                <input type="password" id="loginPin" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" class="input-box" placeholder="••••" required>
                <div class="input-icon-right">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>

            <div class="form-action-area">
                <button type="submit" id="submitBtn" class="btn-submit">Verify and Log In</button>
                <a href="#" class="reset-link">Forgot Pin? <span>Reset</span></a>
            </div>

        </form>

        <div class="signup-redirect-footer">
            New to BirrGo? <a href="register.html">Create Account</a>
        </div>

    </div>

    <!-- Firebase Authentication Pipeline Integration Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Firebase Web Configuration Setup
        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b",
            measurementId: "G-24X13TZ43D"
        };

        // Initialize Native Core Elements
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Feedback System Handler
        function showNotification(message) {
            const toast = document.getElementById('toast-message');
            toast.innerText = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }

        // Intercept Submission Framework
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const rawPhone = document.getElementById('loginPhone').value.trim();
            const pinAttempt = document.getElementById('loginPin').value;

            // Normalize phone string by removing any leading zero structures 
            let cleanPhone = rawPhone.replace(/^0+/, '');

            if (!/^[79][0-9]{8}$/.test(cleanPhone)) {
                showNotification("Please enter a valid Ethiopian phone sequence.");
                return;
            }
            if (pinAttempt.length !== 4 || !/^\d+$/.test(pinAttempt)) {
                showNotification("PIN must be a valid 4-digit entry.");
                return;
            }

            try {
                // UI Interface Locking
                submitBtn.disabled = true;
                submitBtn.innerText = "Authenticating Session...";

                // Fetch data node mapping the phone string directly
                const userSnapshot = await get(ref(db, 'users/' + cleanPhone));

                if (!userSnapshot.exists()) {
                    showNotification("Account not found. Please register first.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Verify and Log In";
                    return;
                }

                const userData = userSnapshot.val();

                // Structural validation criteria execution logic
                if (userData.securityPin === pinAttempt) {
                    // Match confirmed! Initialize persistent session state
                    localStorage.setItem('auth_session_phone', cleanPhone);
                    
                    submitBtn.innerText = "Redirecting Securely...";
                    
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1000);
                } else {
                    showNotification("Incorrect security PIN profile entry.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Verify and Log In";
                }

            } catch (error) {
                console.error("Authentication Network Latency: ", error);
                showNotification("Connection lost. Please try again.");
                submitBtn.disabled = false;
                submitBtn.innerText = "Verify and Log In";
            }
        });
    </script>
</body>
</html>
