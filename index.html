<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo Mobile Wallet</title>
    <style>
        :root {
            --primary-burgundy: #800020;
            --primary-gradient: linear-gradient(180deg, #8b0000 0%, #4a0000 100%);
            --text-dark: #222222;
            --text-muted: #666666;
            --bg-light: #ffffff;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Immersive full-screen framework */
        html, body {
            width: 100%;
            height: 100dvh; 
            overflow: hidden;
            background-color: var(--bg-light);
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Mobile APK container frame logic */
        .app-view {
            width: 100%;
            height: 100dvh;
            max-width: 450px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: calc(20px + env(safe-area-inset-top)) 24px calc(20px + env(safe-area-inset-bottom)) 24px;
            background: radial-gradient(circle at 100% 0%, rgba(0,0,0,0.015) 0%, transparent 40%),
                        radial-gradient(circle at 0% 100%, rgba(0,0,0,0.01) 0%, transparent 40%);
        }

        /* Centered logo container */
        .brand-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: 15px;
            width: 100%;
            flex: 1.2;
            justify-content: center;
        }

        .logo-image {
            width: 75%;
            max-width: 220px;
            height: auto;
            object-fit: contain;
        }

        /* Headline text */
        .welcome-content {
            text-align: center;
            padding: 0 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .welcome-content h1 {
            font-size: 30px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 12px;
            font-family: 'Georgia', serif;
        }

        .welcome-content p {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.5;
            font-weight: 400;
        }

        /* Horizontal mini-slides cards feature container */
        .features-container {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 15px 0;
            width: 100%;
            flex: 1;
            align-items: center;
        }

        .feature-card {
            flex: 1;
            max-width: 105px;
            height: 105px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .feature-card.active {
            transform: scale(1.06);
            border: 1px solid rgba(0,0,0,0.06);
        }

        .card-inner-box {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        /* Navigation action triggers at bottom */
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            margin-top: auto;
            padding-bottom: 5px;
        }

        .btn {
            width: 100%;
            height: 54px;
            border-radius: 27px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s ease;
            text-decoration: none; /* Clear standard anchor text underline style rules */
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: #ffffff;
            box-shadow: 0 6px 16px rgba(128, 0, 32, 0.25);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-dark);
            border: 2px solid #333333;
        }

        .footer-links {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 10px;
        }

        .footer-links a {
            color: var(--text-dark);
            text-decoration: underline;
            margin: 0 2px;
        }
    </style>
</head>
<body>

    <div class="app-view">
        
        <div class="brand-section">
            <img class="logo-image" src="birrgo-logo.png" alt="BirrGo Mobile Wallet Logo">
        </div>

        <div class="welcome-content">
            <h1>Welcome to BirrGo!</h1>
            <p>The fast, secure, and easy way to manage your finances in Ethiopia. Pay, send, and save with confidence.</p>
        </div>

        <div class="features-container">
            <div class="feature-card">
                <div class="card-inner-box" style="background-color: #fdf2f4;">
                    <span>💸</span>
                </div>
            </div>
            <div class="feature-card active">
                <div class="card-inner-box" style="background-color: #f0f4f8;">
                    <span>📱🔒</span>
                </div>
            </div>
            <div class="feature-card">
                <div class="card-inner-box" style="background-color: #fcf6f0;">
                    <span>🏦</span>
                </div>
            </div>
        </div>

        <div class="action-area">
            <a href="created.html" class="btn btn-primary">Create Account</a>
            
            <a href="login.html" class="btn btn-secondary">Log In</a>
            
            <div class="footer-links">
                Need help? <a href="#">Contact support</a> | <a href="#">Terms</a> | <a href="#">Privacy</a>
            </div>
        </div>

    </div>

</body>
</html>
